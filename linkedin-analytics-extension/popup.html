<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn Personal Analytics</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>LinkedIn Personal Analytics</h1>
      <div class="actions">
        <button id="refresh">Refresh</button>
        <button id="clear" class="ghost">Clear</button>
      </div>
    </header>
    <div id="status" class="status"></div>
    <section id="profile" class="card hidden"></section>
    <section id="stats" class="grid hidden"></section>
    <section id="posts" class="card hidden">
      <h2>Recent posts</h2>
      <div id="post-list"></div>
    </section>
    <footer>
      <small
        >Data is fetched from your own LinkedIn session and stored locally.
        Nothing is sent anywhere.</small
      >
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
