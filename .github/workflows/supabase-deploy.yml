name: Supabase Deploy Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.30.4

      - name: Deploy all edge functions
        run: |
          for fn in $(ls supabase/functions/ | grep -v _shared); do
            echo "Deploying $fn..."
            supabase functions deploy $fn --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || echo "⚠️ Failed to deploy $fn"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CLI_LOGIN_TOKEN }}
