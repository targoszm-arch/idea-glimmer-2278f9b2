name: Supabase Deploy Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.30.4

      - run: |
          for fn in \
            framer-sync-articles framer-probe make-webhook \
            sync-to-notion sync-to-shopify \
            notion-oauth-start notion-oauth-callback \
            shopify-oauth-start shopify-oauth-callback \
            intercom-oauth-start intercom-oauth-callback \
            google-oauth-start google-oauth-callback; do
            echo "Deploying $fn..."
            supabase functions deploy $fn --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CLI_LOGIN_TOKEN }}
