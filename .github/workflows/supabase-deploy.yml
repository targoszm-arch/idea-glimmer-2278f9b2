name: Supabase Deploy (migrations + functions)

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  supabase-deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_CLI_LOGIN_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          rm -rf supabase supabase_linux_amd64.tar.gz
          LATEST=$(curl -s https://api.github.com/repos/supabase/cli/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "Installing Supabase CLI $LATEST"
          wget -q "https://github.com/supabase/cli/releases/download/${LATEST}/supabase_linux_amd64.tar.gz"
          tar -xzf supabase_linux_amd64.tar.gz
          sudo install -m 755 supabase /usr/local/bin/supabase
          rm -f supabase supabase_linux_amd64.tar.gz
          supabase --version

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Run DB migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: |
          set -e
          for fn in framer-sync-articles framer-probe make-webhook; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Done
        run: echo "All done!"
